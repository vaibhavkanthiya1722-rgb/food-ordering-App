<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pro Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="weather-anim">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="rain"></div>
    </div>

    <div class="card">

        <div class="main">

            <div class="left">

                <div class="top">
                    <h2>Weather App</h2>
                    <div>
                        <button onclick="getLocationWeather()">📍</button>
                        <button onclick="toggleDarkMode()">🌙</button>
                    </div>
                </div>

                <div class="search">
                    <input type="text" id="city" placeholder="Enter city">
                    <button onclick="getWeather()">Search</button>
                </div>

                <p id="placeholder">Search city or use 📍 location</p>

                <div class="weather-box">
                    <img id="icon">
                    <h1 id="temp">--°C</h1>
                    <p id="desc"></p>
                </div>

                <div id="forecast" class="forecast"></div>
                <canvas id="weatherChart"></canvas>

            </div>
            <div class="right">
                <img id="weatherImg" src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>

</html>
